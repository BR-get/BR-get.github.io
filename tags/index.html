<script>

document.addEventListener('DOMContentLoaded',function(){
  function setBg(u){
    document.body.style.backgroundImage='url('+u+')';
    document.body.style.backgroundSize='cover';
    document.body.style.backgroundPosition='center';
    document.body.style.backgroundAttachment='fixed';
    document.body.classList.add('has-bing-bg');
  }
  var c = localStorage.getItem('wow_bg'), t = new Date().toDateString();
  if(c && c.indexOf(t+'|')===0) setBg(c.slice(t.length+1));
  fetch('https://bing.biturl.top/?resolution=1920&format=json')
    .then(function(r){return r.json()})
    .then(function(d){
      if(d&&d.url){
        var u = d.url.replace(/^http:/,'https:');
        setBg(u); localStorage.setItem('wow_bg',t+'|'+u);
      }
    })
    .catch(function(){});
});
</script>
